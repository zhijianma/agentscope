name: gpt-4o
label: GPT-4o
status: active

input_types:
  - text/plain
  - image/jpeg
  - image/png
  - image/gif
  - image/webp

output_types:
  - text/plain

context_size: 128000
output_size: 16384

parameter_overrides:
  max_tokens:
    maximum: 16384
  thinking_enable:
    hidden: true
  reasoning_effort:
    hidden: true
  # Voice only applies to omni-style models; hide the field for this
  # non-omni model so the frontend popover doesn't render it.
  voice:
    hidden: true
